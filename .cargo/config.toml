# Increase the default Windows main-thread stack to 32 MiB.
# Debug builds generate very large stack frames (proc-macro-generated futures,
# clap parser) that overflow the default 1 MiB stack at startup.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:67108864"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-arg=-Wl,--stack,67108864"]
